<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero C — Refined Orbital</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#06080c; --hl:#a8c060; --txt:#d8e0b8; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--txt);overflow:hidden}
  .hero{position:relative;width:100vw;height:100vh;overflow:hidden;
    background:radial-gradient(ellipse at 50% 38%, #14110e 0%, #0a0a0c 50%, #05060a 100%)}
  canvas.stars{position:absolute;inset:0;z-index:1}
  .orbits{position:absolute;inset:0;z-index:2;pointer-events:none}

  .core{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);z-index:5;
    width:min(19vh,190px);height:min(19vh,190px);display:grid;place-items:center}
  .core::before{content:"";position:absolute;inset:-55%;border-radius:50%;
    background:radial-gradient(circle, rgba(168,192,96,.38), transparent 66%);animation:pulse 5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.8;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
  .core img{position:relative;width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 20px rgba(168,192,96,.55))}

  .node{position:absolute;left:0;top:0;z-index:5;text-align:center;will-change:transform;cursor:pointer}
  .node .ring{border-radius:50%;display:grid;place-items:center;margin:0 auto;
    background:radial-gradient(circle, rgba(0,0,0,.35), transparent 72%);
    filter:drop-shadow(0 0 13px var(--c));transition:filter .3s}
  .node img{width:100%;height:100%;object-fit:contain}
  .node span{display:block;margin-top:6px;font-family:'Orbitron',sans-serif;font-size:10px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--txt);white-space:nowrap}
  .node:hover .ring{filter:drop-shadow(0 0 22px var(--c))}

  .vig{position:absolute;inset:0;z-index:7;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 56%, rgba(0,0,0,.66) 100%)}
  .title{position:absolute;left:0;right:0;bottom:7%;z-index:6;text-align:center;pointer-events:none}
  .title h1{font-family:'Orbitron',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3.5rem);
    letter-spacing:.34em;color:#fff;text-shadow:0 0 28px rgba(168,192,96,.6)}
  .title p{margin-top:10px;letter-spacing:.32em;text-transform:uppercase;font-size:.76rem;color:var(--hl)}
</style>
</head>
<body>
  <div class="hero">
    <canvas class="stars"></canvas>
    <svg class="orbits" id="orbits">
      <defs>
        <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="3.2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>
    <div class="core"><img src="../Assets/G.H.O.S.T---flat_r2.png" alt="G.H.O.S.T." /></div>
    <div class="vig"></div>
    <div class="title"><h1>G.H.O.S.T.</h1><p>Galactic Helldivers Operations Strike Taskforce</p></div>
  </div>

  <script src="_shared.js"></script>
  <script>
    startStarfield(document.querySelector('canvas.stars'), { density: 1, color:'#bcd08a' });

    const hero = document.querySelector('.hero');
    const svg = document.getElementById('orbits');
    const SQUASH = 0.32;            // ellipse flatten (perspective tilt)
    let cx, cy, R1, R2;

    function geom(){
      const W = innerWidth, H = innerHeight;
      cx = W/2; cy = H*0.38;
      const base = Math.min(W*0.46, H*0.62);
      R2 = base; R1 = base*0.60;
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.innerHTML = svg.querySelector('defs').outerHTML;
      [ [R1,'#7e8a55'], [R2,'#6a7a4a'] ].forEach(([r,c])=>{
        const el = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
        el.setAttribute('cx',cx); el.setAttribute('cy',cy);
        el.setAttribute('rx',r); el.setAttribute('ry',r*SQUASH);
        el.setAttribute('fill','none'); el.setAttribute('stroke',c);
        el.setAttribute('stroke-width','2.2'); el.setAttribute('opacity','0.5');
        el.setAttribute('filter','url(#bloom)');
        svg.appendChild(el);
      });
    }

    const inner = GHOST_DIVISIONS.slice(0,4);
    const outer = GHOST_DIVISIONS.slice(4);
    const nodes = [];
    function makeNode(d, ring, idx, count){
      const n = document.createElement('div');
      n.className='node'; n.style.setProperty('--c', d.color);
      const size = ring===0 ? 64 : 72;
      n.innerHTML = `<div class="ring" style="width:${size}px;height:${size}px"><img src="${d.logo}"></div><span>${d.name}</span>`;
      hero.appendChild(n);
      nodes.push({ el:n, ring, phase:(idx/count)*Math.PI*2, size });
    }
    inner.forEach((d,i)=>makeNode(d,0,i,inner.length));
    outer.forEach((d,i)=>makeNode(d,1,i,outer.length));

    geom();
    addEventListener('resize', geom);

    let t0 = performance.now();
    function tick(now){
      const t = (now - t0)/1000;
      for(const nd of nodes){
        const r = nd.ring===0 ? R1 : R2;
        const sp = nd.ring===0 ? 0.16 : 0.10;
        const a = nd.phase + t*sp;
        const x = cx + Math.cos(a)*r;
        const y = cy + Math.sin(a)*r*SQUASH;
        const depth = (Math.sin(a)+1)/2;        // 0 back .. 1 front
        const scale = 0.72 + depth*0.5;
        nd.el.style.transform = `translate(${x}px,${y}px) translate(-50%,-50%) scale(${scale})`;
        nd.el.style.zIndex = 3 + Math.round(depth*4);
        nd.el.style.opacity = 0.55 + depth*0.45;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
