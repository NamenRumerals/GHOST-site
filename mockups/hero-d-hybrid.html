<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero D — HUD + Orbital Hybrid</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#06080c; --hl:#a8c060; --txt:#d8e0b8; --accent:#6a8a30; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--txt);overflow:hidden}
  .hero{position:relative;width:100vw;height:100vh;overflow:hidden;
    background:radial-gradient(ellipse at 50% 40%, #14180e 0%, #0a0c0a 48%, #05060a 100%)}
  canvas.stars{position:absolute;inset:0;z-index:1}
  .orbits{position:absolute;inset:0;z-index:2;pointer-events:none}
  .dash{animation:flow var(--sp,9s) linear infinite}
  @keyframes flow{to{stroke-dashoffset:-400}}

  .core{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);z-index:5;
    width:min(18vh,180px);height:min(18vh,180px);display:grid;place-items:center}
  .core::before{content:"";position:absolute;inset:-58%;border-radius:50%;
    background:radial-gradient(circle, rgba(168,192,96,.40), transparent 66%);animation:pulse 5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.8;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
  .core img{position:relative;width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 20px rgba(168,192,96,.55))}

  .node{position:absolute;left:0;top:0;z-index:5;text-align:center;will-change:transform;cursor:pointer}
  .node .ring{border-radius:50%;display:grid;place-items:center;margin:0 auto;
    background:radial-gradient(circle, rgba(0,0,0,.4), transparent 72%);
    border:1.5px solid var(--c);box-shadow:0 0 16px -3px var(--c), inset 0 0 12px -5px var(--c);
    transition:box-shadow .3s,transform .3s}
  .node img{object-fit:contain}
  .node span{display:block;margin-top:6px;font-family:'Orbitron',sans-serif;font-size:10px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--txt);white-space:nowrap}
  .node:hover .ring{box-shadow:0 0 26px 0 var(--c), inset 0 0 12px -4px var(--c);transform:scale(1.1)}

  .scan{position:absolute;inset:0;z-index:7;pointer-events:none;
    background:repeating-linear-gradient(0deg, transparent 0 3px, rgba(0,0,0,.15) 3px 4px)}
  .vig{position:absolute;inset:0;z-index:7;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 54%, rgba(0,0,0,.72) 100%)}

  .brackets{position:absolute;inset:26px;z-index:8;pointer-events:none}
  .brackets i{position:absolute;width:26px;height:26px;border:1.5px solid rgba(168,192,96,.45)}
  .brackets .tl{top:0;left:0;border-right:0;border-bottom:0}
  .brackets .tr{top:0;right:0;border-left:0;border-bottom:0}
  .brackets .bl{bottom:0;left:0;border-right:0;border-top:0}
  .brackets .br{bottom:0;right:0;border-left:0;border-top:0}
  .readout{position:absolute;top:30px;left:34px;z-index:8;font-size:11px;letter-spacing:.14em;
    color:var(--accent);line-height:1.7;pointer-events:none}
  .readout b{color:var(--hl);font-weight:400}

  .title{position:absolute;left:0;right:0;bottom:6.5%;z-index:8;text-align:center;pointer-events:none}
  .title h1{font-family:'Orbitron',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3.5rem);
    letter-spacing:.34em;color:#fff;text-shadow:0 0 28px rgba(168,192,96,.6)}
  .title p{margin-top:10px;letter-spacing:.32em;text-transform:uppercase;font-size:.76rem;color:var(--hl)}
</style>
</head>
<body>
  <div class="hero">
    <canvas class="stars"></canvas>
    <svg class="orbits" id="orbits">
      <defs>
        <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>
    <div class="core"><img src="../Assets/G.H.O.S.T---flat_r2.png" alt="G.H.O.S.T." /></div>

    <div class="brackets"><i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i></div>
    <div class="readout">G.H.O.S.T. TACTICAL DISPLAY<br>STATUS: <b>ONLINE</b><br>DIVISIONS: <b>07</b></div>
    <div class="scan"></div>
    <div class="vig"></div>
    <div class="title"><h1>G.H.O.S.T.</h1><p>Galactic Helldivers Operations Strike Taskforce</p></div>
  </div>

  <script src="_shared.js"></script>
  <script>
    startStarfield(document.querySelector('canvas.stars'), { density: 1, color:'#bcd08a' });

    const hero = document.querySelector('.hero');
    const svg = document.getElementById('orbits');
    const SQUASH = 0.40;   // between C's flat 0.32 and A's face-on circle
    let cx, cy, R1, R2;

    function ellipse(r, stroke, sw, op, dash, sp, dir){
      const el = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
      el.setAttribute('cx',cx); el.setAttribute('cy',cy);
      el.setAttribute('rx',r); el.setAttribute('ry',r*SQUASH);
      el.setAttribute('fill','none'); el.setAttribute('stroke',stroke);
      el.setAttribute('stroke-width',sw); el.setAttribute('opacity',op);
      if(dash){ el.setAttribute('stroke-dasharray',dash); el.setAttribute('class','dash');
        el.style.setProperty('--sp',sp+'s'); if(dir<0) el.style.animationDirection='reverse'; }
      else { el.setAttribute('filter','url(#bloom)'); }
      svg.appendChild(el);
      return el;
    }
    function geom(){
      const W=innerWidth,H=innerHeight; cx=W/2; cy=H*0.40;
      const base=Math.min(W*0.44,H*0.60); R2=base; R1=base*0.60;
      svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
      svg.innerHTML = svg.querySelector('defs').outerHTML;
      ellipse(R1*0.82,'#3d5420',0.8,0.45,'2 9',26,1);    // inner radar guide
      ellipse(R1,'#8a9a5e',2.2,0.5,null);                 // inner glow trail
      ellipse((R1+R2)/2,'#3d5420',0.8,0.4,'30 12',40,-1); // mid radar guide
      ellipse(R2,'#7a8a52',2.2,0.5,null);                 // outer glow trail
      ellipse(R2*1.12,'#3d5420',0.7,0.35,'2 11',32,1);    // outer radar guide
    }

    const inner=GHOST_DIVISIONS.slice(0,4), outer=GHOST_DIVISIONS.slice(4);
    const nodes=[];
    function makeNode(d,ring,idx,count){
      const n=document.createElement('div'); n.className='node'; n.style.setProperty('--c',d.color);
      const size = ring===0?62:70;
      n.innerHTML = `<div class="ring" style="width:${size}px;height:${size}px"><img src="${d.logo}" style="width:${size-14}px;height:${size-14}px"></div><span>${d.name}</span>`;
      hero.appendChild(n);
      nodes.push({el:n,ring,phase:(idx/count)*Math.PI*2});
    }
    inner.forEach((d,i)=>makeNode(d,0,i,inner.length));
    outer.forEach((d,i)=>makeNode(d,1,i,outer.length));

    geom(); addEventListener('resize',geom);

    let t0=performance.now();
    function tick(now){
      const t=(now-t0)/1000;
      for(const nd of nodes){
        const r = nd.ring===0?R1:R2;
        const sp = nd.ring===0?0.15:0.095;
        const a = nd.phase + t*sp;
        const x = cx + Math.cos(a)*r;
        const y = cy + Math.sin(a)*r*SQUASH;
        const depth=(Math.sin(a)+1)/2;
        const scale=0.74+depth*0.46;
        nd.el.style.transform=`translate(${x}px,${y}px) translate(-50%,-50%) scale(${scale})`;
        nd.el.style.zIndex=3+Math.round(depth*4);
        nd.el.style.opacity=0.58+depth*0.42;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
