<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero A — Tactical HUD Core</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#070a06; --hl:#a8c060; --txt:#d8e0b8; --accent:#6a8a30; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--txt);overflow:hidden}
  .hero{position:relative;width:100vw;height:100vh;overflow:hidden;
    background:radial-gradient(circle at 50% 46%, #16210e 0%, #0a0e07 45%, #050706 100%);}
  canvas.stars{position:absolute;inset:0;z-index:1}
  .stage{position:absolute;inset:0;z-index:2;display:grid;place-items:center}

  .rings{position:absolute;width:min(86vh,860px);height:min(86vh,860px);}
  .rings svg{width:100%;height:100%;overflow:visible}
  .spin-cw{animation:spin 60s linear infinite;transform-origin:center}
  .spin-ccw{animation:spin 90s linear infinite reverse;transform-origin:center}
  @keyframes spin{to{transform:rotate(360deg)}}

  .core{position:relative;width:min(20vh,200px);height:min(20vh,200px);display:grid;place-items:center;z-index:5}
  .core::before{content:"";position:absolute;inset:-60%;border-radius:50%;
    background:radial-gradient(circle, rgba(168,192,96,.40) 0%, rgba(120,150,60,.12) 40%, transparent 70%);
    animation:pulse 4s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.12);opacity:1}}
  .core img{position:relative;width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 0 18px rgba(168,192,96,.55))}

  .node{position:absolute;left:50%;top:50%;z-index:6;width:104px;margin:-52px 0 0 -52px;
    text-align:center;cursor:pointer}
  .node-inner{animation:float 6s ease-in-out infinite}
  .node .ring{width:84px;height:84px;margin:0 auto;border-radius:50%;display:grid;place-items:center;
    background:radial-gradient(circle, rgba(0,0,0,.45), rgba(0,0,0,.05));
    border:1.5px solid var(--c);box-shadow:0 0 18px -2px var(--c), inset 0 0 14px -4px var(--c);
    transition:transform .25s, box-shadow .25s}
  .node img{width:70px;height:70px;object-fit:contain}
  .node span{display:block;margin-top:9px;font-family:'Orbitron',sans-serif;font-size:11px;
    letter-spacing:.12em;color:var(--txt);text-transform:uppercase;opacity:.9}
  .node:hover .ring{transform:scale(1.12);box-shadow:0 0 30px 0 var(--c), inset 0 0 16px -2px var(--c)}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

  .tether{position:absolute;left:50%;top:50%;height:1px;transform-origin:left center;z-index:3;
    background:linear-gradient(90deg, transparent, var(--c) 80%);opacity:.35}

  .scan{position:absolute;inset:0;z-index:7;pointer-events:none;
    background:repeating-linear-gradient(0deg, transparent 0 3px, rgba(0,0,0,.16) 3px 4px)}
  .vig{position:absolute;inset:0;z-index:7;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,.78) 100%)}

  .title{position:absolute;left:0;right:0;bottom:7%;z-index:8;text-align:center;pointer-events:none}
  .title h1{font-family:'Orbitron',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3.4rem);
    letter-spacing:.34em;color:#fff;text-shadow:0 0 26px rgba(168,192,96,.6)}
  .title p{margin-top:10px;letter-spacing:.32em;text-transform:uppercase;font-size:.78rem;color:var(--hl)}

  .brackets{position:absolute;inset:26px;z-index:8;pointer-events:none}
  .brackets i{position:absolute;width:26px;height:26px;border:1.5px solid rgba(168,192,96,.45)}
  .brackets .tl{top:0;left:0;border-right:0;border-bottom:0}
  .brackets .tr{top:0;right:0;border-left:0;border-bottom:0}
  .brackets .bl{bottom:0;left:0;border-right:0;border-top:0}
  .brackets .br{bottom:0;right:0;border-left:0;border-top:0}
  .readout{position:absolute;top:30px;left:34px;z-index:8;font-size:11px;letter-spacing:.14em;
    color:var(--accent);line-height:1.7;pointer-events:none}
</style>
</head>
<body>
  <div class="hero">
    <canvas class="stars"></canvas>
    <div class="brackets"><i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i></div>
    <div class="readout">G.H.O.S.T. TACTICAL DISPLAY<br>STATUS: ONLINE<br>DIVISIONS: 07</div>

    <div class="stage">
      <div class="rings">
        <svg viewBox="0 0 400 400">
          <g class="spin-cw">
            <circle cx="200" cy="200" r="196" fill="none" stroke="#6a8a30" stroke-width="0.6" stroke-dasharray="2 6" opacity="0.5"/>
            <circle cx="200" cy="200" r="150" fill="none" stroke="#a8c060" stroke-width="0.6" stroke-dasharray="1 10" opacity="0.6"/>
          </g>
          <g class="spin-ccw">
            <circle cx="200" cy="200" r="172" fill="none" stroke="#3d5420" stroke-width="0.8" stroke-dasharray="40 14" opacity="0.7"/>
            <circle cx="200" cy="200" r="110" fill="none" stroke="#6a8a30" stroke-width="0.6" stroke-dasharray="2 8" opacity="0.5"/>
          </g>
        </svg>
      </div>
      <div class="core"><img src="../Assets/G.H.O.S.T---flat_r2.png" alt="G.H.O.S.T." /></div>
    </div>

    <div class="scan"></div>
    <div class="vig"></div>
    <div class="title"><h1>G.H.O.S.T.</h1><p>Galactic Helldivers Operations Strike Taskforce</p></div>
  </div>

  <script src="_shared.js"></script>
  <script>
    startStarfield(document.querySelector('canvas.stars'), { density: 1, color:'#bcd08a' });
    const stage = document.querySelector('.stage');
    const R = Math.min(window.innerHeight*0.86, 860)/2 * 0.80;
    GHOST_DIVISIONS.forEach((d, i) => {
      const ang = (-90 + i * (360/GHOST_DIVISIONS.length)) * Math.PI/180;
      const x = Math.cos(ang)*R, y = Math.sin(ang)*R;
      const tether = document.createElement('div');
      tether.className='tether';
      tether.style.setProperty('--c', d.color);
      tether.style.width = R+'px';
      tether.style.transform = `rotate(${ang}rad)`;
      stage.appendChild(tether);
      const node = document.createElement('div');
      node.className='node';
      node.style.setProperty('--c', d.color);
      node.style.transform = `translate(${x}px, ${y}px)`;
      node.innerHTML = `<div class="node-inner" style="animation-delay:${i*0.4}s"><div class="ring"><img src="${d.logo}" alt=""></div><span>${d.name}</span></div>`;
      stage.appendChild(node);
    });
  </script>
</body>
</html>
